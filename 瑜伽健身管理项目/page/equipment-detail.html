<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>器材详情</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background-color: #f8f9fa;
            color: #333;
            line-height: 1.6;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* 返回按钮 */
        .back-btn {
            display: inline-flex;
            align-items: center;
            padding: 10px 20px;
            background: none;
            border: none;
            color: #00BE9A;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }
        
        .back-btn:hover {
            color: #00a886;
            transform: translateX(-5px);
        }
        
        .back-btn i {
            margin-right: 8px;
            font-size: 18px;
        }
        
        /* 详情内容 */
        .detail-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }
        
        .detail-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            border-bottom: 1px solid #eee;
        }
        
        .equipment-title {
            font-size: 24px;
            color: #333;
            font-weight: 600;
        }
        
        .equipment-price {
            font-size: 28px;
            color: #d32f2f;
            font-weight: bold;
        }
        
        /* 主要内容区域 */
        .detail-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            padding: 30px;
        }
        
        @media (max-width: 768px) {
            .detail-content {
                grid-template-columns: 1fr;
            }
        }
        
        /* 左侧图片区域 */
        .image-section {
            position: sticky;
            top: 20px;
        }
        
        .main-image {
            width: 100%;
            height: 400px;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 20px;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .main-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }
        
        .main-image img:hover {
            transform: scale(1.02);
        }
        
        .image-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 16px;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #f5f5f5 25%, #e8e8e8 25%, #e8e8e8 50%, #f5f5f5 50%, #f5f5f5 75%, #e8e8e8 75%);
            background-size: 20px 20px;
        }
        
        .image-placeholder i {
            font-size: 60px;
            margin-bottom: 10px;
            color: #ccc;
        }
        
        .image-thumbnails {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        
        .thumbnail {
            width: 100%;
            height: 80px;
            border-radius: 4px;
            overflow: hidden;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.3s ease;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .thumbnail:hover {
            border-color: #00BE9A;
        }
        
        .thumbnail.active {
            border-color: #00BE9A;
        }
        
        .thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .thumbnail-placeholder {
            color: #999;
            font-size: 12px;
        }
        
        /* 右侧信息区域 */
        .info-section {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }
        
        /* 基本信息卡片 */
        .info-card {
            background: #f9f9f9;
            border-radius: 8px;
            padding: 20px;
        }
        
        .info-card h3 {
            color: #333;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #00BE9A;
            font-size: 18px;
        }
        
        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        
        @media (max-width: 480px) {
            .info-grid {
                grid-template-columns: 1fr;
            }
        }
        
        .info-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        
        .info-label {
            font-size: 14px;
            color: #666;
        }
        
        .info-value {
            font-size: 16px;
            color: #333;
            font-weight: 500;
        }
        
        /* 状态标签 */
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
        }
        
        .status-normal {
            background: #e8f5e9;
            color: #4CAF50;
        }
        
        .status-repair {
            background: #fff3e0;
            color: #FF9800;
        }
        
        .status-scrap {
            background: #ffebee;
            color: #F44336;
        }
        
        /* 描述卡片 */
        .description-card {
            background: #f9f9f9;
            border-radius: 8px;
            padding: 20px;
        }
        
        .description-text {
            color: #555;
            line-height: 1.8;
            font-size: 15px;
        }
        
        /* 规格卡片 */
        .specs-card {
            background: #f9f9f9;
            border-radius: 8px;
            padding: 20px;
        }
        
        .specs-list {
            list-style: none;
        }
        
        .specs-list li {
            padding: 8px 0;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
        }
        
        .specs-list li:last-child {
            border-bottom: none;
        }
        
        .spec-label {
            color: #666;
        }
        
        .spec-value {
            color: #333;
            font-weight: 500;
        }
        
        /* 操作按钮 */
        .action-buttons {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        
        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .btn-reserve {
            background: #00BE9A;
            color: white;
            flex: 1;
        }
        
        .btn-reserve:hover {
            background: #00a886;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 190, 154, 0.3);
        }
        
        .btn-reserve:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .btn-back {
            background: #f0f0f0;
            color: #666;
            flex: 1;
        }
        
        .btn-back:hover {
            background: #e0e0e0;
            transform: translateY(-2px);
        }
        
        /* 加载和错误状态 */
        .loading-state, .error-state, .empty-state {
            text-align: center;
            padding: 60px 20px;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #00BE9A;
            border-radius: 50%;
            margin: 0 auto 20px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .loading-text {
            color: #666;
            font-size: 16px;
        }
        
        .error-icon, .empty-icon {
            font-size: 50px;
            margin-bottom: 20px;
            color: #ff6b6b;
        }
        
        .empty-icon {
            color: #999;
        }
        
        .error-text, .empty-text {
            color: #666;
            margin-bottom: 20px;
            font-size: 16px;
        }
        
        .retry-btn {
            padding: 10px 25px;
            background: #00BE9A;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 10px;
        }
        
        .retry-btn:hover {
            background: #00a886;
        }
        
        /* 训练部位标签 */
        .training-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }
        
        .tag {
            padding: 4px 12px;
            background: #e8f5e9;
            color: #2e7d32;
            border-radius: 20px;
            font-size: 13px;
        }
        
        /* 标签颜色 */
        .tag-chest { background: #ffebee; color: #c62828; }
        .tag-back { background: #e3f2fd; color: #1565c0; }
        .tag-shoulder { background: #e8eaf6; color: #3949ab; }
        .tag-legs { background: #f3e5f5; color: #7b1fa2; }
        .tag-arms { background: #fff3e0; color: #ef6c00; }
        .tag-core { background: #e0f2f1; color: #00695c; }
        .tag-full-body { background: #f1f8e9; color: #558b2f; }
    </style>
</head>
<body>
    <div class="container">
        <button class="back-btn" onclick="goBack()">
            <i>←</i> 返回器材列表
        </button>
        
        <div id="detailContent">
            <div class="loading-state">
                <div class="loading-spinner"></div>
                <p class="loading-text">正在加载器材详情...</p>
            </div>
        </div>
    </div>
    
    <script>
        const API_BASE = 'http://127.0.0.1:8081/LX';
        
        function getEquipmentId() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('id');
        }
        
        function goBack() {
            if (document.referrer) {
                window.history.back();
            } else {
                window.location.href = 'access.html';
            }
        }
        
        async function loadEquipmentDetail() {
            const equipmentId = getEquipmentId();
            
            if (!equipmentId) {
                showError('未找到器材ID，请从正确页面进入');
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/equipment/detail/${equipmentId}`, {
                    headers: {
                        'Accept': 'application/json',
                        'Content-Type': 'application/json'
                    }
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP错误! 状态码: ${response.status}`);
                }
                
                const result = await response.json();
                
                console.log('API响应:', result);
                console.log('器材数据:', result.data);
                
                if (result.data) {
                    console.log('图片字段:', result.data.picture);
                    console.log('图片字段类型:', typeof result.data.picture);
                }
                
                if (result.code === 200 && result.data) {
                    renderEquipmentDetail(result.data);
                } else if (result.code === 404) {
                    showEmpty('器材不存在或已被移除');
                } else {
                    throw new Error(result.message || '未知错误');
                }
            } catch (error) {
                console.error('加载器材详情失败:', error);
                showError('网络错误，请稍后重试');
            }
        }
        
        function renderEquipmentDetail(equipment) {
            const detailContent = document.getElementById('detailContent');
            
            if (!equipment) {
                showEmpty('器材数据为空');
                return;
            }
            
            // 根据后端VO字段名进行调整
            const equipmentData = {
                id: equipment.equipId,
                name: equipment.equipName,
                description: equipment.equipDescription,
                price: equipment.equipPrice,
                brand: equipment.equipBrand,
                model: equipment.equipModel,
                picture: equipment.picture,
                purchaseDate: equipment.purchaseDate || equipment.formattedPurchaseDate,
                status: mapStatusToNumber(equipment.equipStatus),
                trainingParts: equipment.trainingParts,
                specifications: equipment.equipmentType || equipment.equipCategory,
                category: equipment.equipCategory
            };
            
            // 状态映射
            const statusMap = {
                0: { text: '正常', class: 'status-normal' },
                1: { text: '维修中', class: 'status-repair' },
                2: { text: '已报废', class: 'status-scrap' }
            };
            
            // 将字符串状态转换为数字
            function mapStatusToNumber(statusText) {
                if (!statusText) return 0;
                switch(statusText) {
                    case '正常':
                    case '正常使用':
                        return 0;
                    case '维修中':
                    case '正在维修':
                        return 1;
                    case '报废':
                    case '已报废':
                        return 2;
                    default:
                        return 0;
                }
            }
            
            // 构建训练部位标签
            let trainingPartsHTML = '';
            if (equipmentData.trainingParts) {
                let trainingParts = [];
                
                if (Array.isArray(equipmentData.trainingParts)) {
                    trainingParts = equipmentData.trainingParts;
                } else if (typeof equipmentData.trainingParts === 'string') {
                    trainingParts = equipmentData.trainingParts.split(/[、,，]/).map(item => item.trim());
                }
                
                trainingParts = trainingParts.filter(item => item && item.trim() !== '');
                
                if (trainingParts.length > 0) {
                    trainingParts.forEach(part => {
                        trainingPartsHTML += `<span class="tag">${part}</span>`;
                    });
                }
            }
            
            // 构建图片HTML - 简化处理，按照明星器材页面的方式
            let mainImageHTML = '';
            let thumbnailsHTML = '';
            
            // 处理图片 - 模仿明星器材页面的处理方式
            let imageList = [];
            
            if (equipmentData.picture) {
                // 尝试按逗号分割处理多个图片
                if (typeof equipmentData.picture === 'string') {
                    // 尝试解析JSON
                    try {
                        const parsed = JSON.parse(equipmentData.picture);
                        if (Array.isArray(parsed)) {
                            imageList = parsed;
                        } else if (typeof parsed === 'string') {
                            // 如果是字符串，尝试按逗号分割
                            imageList = parsed.split(',').map(img => img.trim()).filter(img => img !== '');
                        }
                    } catch (e) {
                        // 不是JSON，当作逗号分隔的字符串处理
                        imageList = equipmentData.picture.split(',').map(img => img.trim()).filter(img => img !== '');
                    }
                } else if (Array.isArray(equipmentData.picture)) {
                    imageList = equipmentData.picture;
                }
            }
            
            console.log('处理后的图片列表:', imageList);
            
            if (imageList.length > 0) {
                // 使用第一个图片作为主图
                let mainImageSrc = imageList[0];
                
                // 如果图片路径不是以http开头，直接使用，就像明星器材页面那样
                // 不要拼接API路径
                mainImageHTML = `
                    <img id="mainImage" src="${mainImageSrc}" alt="${equipmentData.name}" 
                         onerror="handleImageError(this, '${mainImageSrc}')">
                `;
                
                // 生成所有图片的缩略图
                imageList.forEach((imgSrc, index) => {
                    thumbnailsHTML += `
                        <div class="thumbnail ${index === 0 ? 'active' : ''}" onclick="changeMainImage('${imgSrc}', this)">
                            <img src="${imgSrc}" alt="器材图片${index + 1}" 
                                 onerror="handleImageError(this, '${imgSrc}')">
                        </div>
                    `;
                });
            } else {
                // 使用默认图片，按照明星器材页面的方式
                const defaultImage = '../static/img/default-equipment.jpg';
                mainImageHTML = `
                    <img id="mainImage" src="${defaultImage}" alt="${equipmentData.name}" 
                         onerror="handleImageError(this, '${defaultImage}')">
                `;
                
                thumbnailsHTML = `
                    <div class="thumbnail active">
                        <img src="${defaultImage}" alt="默认器材图片" 
                             onerror="handleImageError(this, '${defaultImage}')">
                    </div>
                `;
            }
            
            // 构建规格列表
            let specsHTML = '';
            if (equipmentData.specifications) {
                specsHTML = `
                    <li>
                        <span class="spec-label">器材类型</span>
                        <span class="spec-value">${equipmentData.specifications}</span>
                    </li>
                `;
            }
            
            if (equipmentData.category) {
                specsHTML += `
                    <li>
                        <span class="spec-label">分类</span>
                        <span class="spec-value">${equipmentData.category}</span>
                    </li>
                `;
            }
            
            // 构建HTML
            const html = `
                <div class="detail-container">
                    <div class="detail-header">
                        <h1 class="equipment-title">${equipmentData.name || '未知器材'}</h1>
                        <div class="equipment-price">¥${(equipmentData.price || 0).toFixed(2)}</div>
                    </div>
                    
                    <div class="detail-content">
                        <div class="image-section">
                            <div class="main-image">
                                ${mainImageHTML}
                            </div>
                            <div class="image-thumbnails">
                                ${thumbnailsHTML}
                            </div>
                        </div>
                        
                        <div class="info-section">
                            <div class="info-card">
                                <h3>基本信息</h3>
                                <div class="info-grid">
                                    <div class="info-item">
                                        <span class="info-label">器材编号</span>
                                        <span class="info-value">${equipmentData.id || 'N/A'}</span>
                                    </div>
                                    <div class="info-item">
                                        <span class="info-label">器材名称</span>
                                        <span class="info-value">${equipmentData.name || '未知'}</span>
                                    </div>
                                    <div class="info-item">
                                        <span class="info-label">器材状态</span>
                                        <span class="info-value">
                                            <span class="status-badge ${statusMap[equipmentData.status]?.class || 'status-normal'}">
                                                ${statusMap[equipmentData.status]?.text || '正常'}
                                            </span>
                                        </span>
                                    </div>
                                    <div class="info-item">
                                        <span class="info-label">采购日期</span>
                                        <span class="info-value">${formatDate(equipmentData.purchaseDate) || '未知'}</span>
                                    </div>
                                    <div class="info-item">
                                        <span class="info-label">品牌</span>
                                        <span class="info-value">${equipmentData.brand || '未知'}</span>
                                    </div>
                                    <div class="info-item">
                                        <span class="info-label">型号</span>
                                        <span class="info-value">${equipmentData.model || '未知'}</span>
                                    </div>
                                </div>
                            </div>
                            
                            ${trainingPartsHTML ? `
                                <div class="info-card">
                                    <h3>训练部位</h3>
                                    <div class="training-tags">
                                        ${trainingPartsHTML}
                                    </div>
                                </div>
                            ` : ''}
                            
                            <div class="description-card">
                                <h3>器材描述</h3>
                                <p class="description-text">${equipmentData.description || '暂无描述'}</p>
                            </div>
                            
                            ${specsHTML ? `
                                <div class="specs-card">
                                    <h3>器材信息</h3>
                                    <ul class="specs-list">
                                        ${specsHTML}
                                    </ul>
                                </div>
                            ` : ''}
                            
                            <div class="action-buttons">
                                <button class="btn btn-reserve ${equipmentData.status !== 0 ? 'disabled' : ''}" 
                                        onclick="reserveEquipment(${equipmentData.id})" 
                                        ${equipmentData.status !== 0 ? 'disabled' : ''}>
                                    <i>📅</i> 立即预约
                                </button>
                                <button class="btn btn-back" onclick="goBack()">
                                    <i>←</i> 返回列表
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            detailContent.innerHTML = html;
        }
        
        // 图片加载错误处理
        function handleImageError(imgElement, imgUrl) {
            console.error('图片加载失败:', imgUrl);
            
            imgElement.onerror = null;
            
            if (imgElement.parentElement.classList.contains('main-image')) {
                imgElement.parentElement.innerHTML = `
                    <div class="image-placeholder">
                        <i>📷</i>
                        <span>图片加载失败</span>
                        <p style="font-size: 12px; margin-top: 5px; color: #999;">URL: ${imgUrl}</p>
                    </div>
                `;
            } else {
                imgElement.parentElement.innerHTML = `
                    <div class="thumbnail-placeholder">
                        图片加载失败
                    </div>
                `;
            }
        }
        
        // 更改主图片
        function changeMainImage(imgSrc, element) {
            const mainImage = document.getElementById('mainImage');
            if (mainImage) {
                mainImage.src = imgSrc;
                mainImage.onerror = function() {
                    handleImageError(this, imgSrc);
                };
            }
            
            // 更新缩略图激活状态
            document.querySelectorAll('.thumbnail').forEach(thumb => {
                thumb.classList.remove('active');
            });
            element.classList.add('active');
        }
        
        // 预约器材
        function reserveEquipment(equipmentId) {
            if (equipmentId) {
                alert(`预约器材ID: ${equipmentId}\n此功能需要后续开发`);
            }
        }
        
        // 格式化日期
        function formatDate(dateString) {
            if (!dateString) return '';
            
            try {
                const date = new Date(dateString);
                if (isNaN(date.getTime())) {
                    return dateString;
                }
                
                return date.toLocaleDateString('zh-CN', {
                    year: 'numeric',
                    month: '2-digit',
                    day: '2-digit'
                });
            } catch (e) {
                return dateString;
            }
        }
        
        // 显示错误状态
        function showError(message) {
            const detailContent = document.getElementById('detailContent');
            detailContent.innerHTML = `
                <div class="error-state">
                    <div class="error-icon">⚠️</div>
                    <p class="error-text">${message || '加载失败，请重试'}</p>
                    <button class="retry-btn" onclick="loadEquipmentDetail()">重新加载</button>
                </div>
            `;
        }
        
        // 显示空状态
        function showEmpty(message) {
            const detailContent = document.getElementById('detailContent');
            detailContent.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">📦</div>
                    <p class="empty-text">${message || '器材不存在'}</p>
                    <button class="btn btn-back" onclick="goBack()">
                        <i>←</i> 返回列表
                    </button>
                </div>
            `;
        }
        
        // 页面加载完成后执行
        document.addEventListener('DOMContentLoaded', function() {
            loadEquipmentDetail();
            
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    goBack();
                }
            });
        });
    </script>
